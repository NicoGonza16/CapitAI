name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: "3.22.0"

jobs:
  # ----------------------------------------------------------------------------
  # 1. Análisis estático + pruebas + cobertura
  # ----------------------------------------------------------------------------
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Riverpod / l10n)
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Enforce 80% coverage
        run: |
          sudo apt-get update -y && sudo apt-get install -y lcov
          PCT=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines.*: \K[0-9.]+' | head -1)
          echo "Coverage: $PCT%"
          if (( $(echo "$PCT < 80" | bc -l) )); then
            echo "::error::Coverage $PCT% is below the 80% threshold"; exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

  # ----------------------------------------------------------------------------
  # 2. Build Android (APK + AppBundle)
  # ----------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: analyze-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter gen-l10n && dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release, prod flavor)
        run: flutter build apk --release --flavor prod -t lib/main_prod.dart

      - name: Build AppBundle (release, prod flavor)
        run: flutter build appbundle --release --flavor prod -t lib/main_prod.dart

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
